<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حضور و غیاب — کافه باراما</title>
<link rel="manifest" href="app.webmanifest">
<meta name="theme-color" content="#2e7d6b">
<link rel="icon" href="icon-192.png"><link rel="apple-touch-icon" href="icon-192.png">
<link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
<style>
  :root{--bg:#f6f7fb;--card:#fff;--ink:#1f2430;--muted:#7a8194;--line:#e7e9f0;--brand:#2e7d6b;
    --brand-soft:#e6f4f0;--accent:#c98a2b;--danger:#d8584f;--radius:16px;--shadow:0 6px 24px rgba(31,36,48,.06)}
  *{box-sizing:border-box}
  body{margin:0;font-family:Vazirmatn,system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:15px}
  button,input,select{font-family:inherit}
  header{background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
  .wrap{max-width:1000px;margin:0 auto;padding:0 18px}
  .topbar{display:flex;align-items:center;gap:12px;height:62px;flex-wrap:wrap}
  .logo{font-weight:800;font-size:19px;color:var(--brand);text-decoration:none}
  nav{display:flex;gap:6px;margin-inline-start:auto;flex-wrap:wrap}
  nav button{border:0;background:transparent;color:var(--muted);font-size:14px;padding:9px 14px;border-radius:12px;cursor:pointer;font-weight:600}
  nav button.active{background:var(--brand-soft);color:var(--brand)}
  .back{color:var(--muted);text-decoration:none;font-size:13px;font-weight:600}
  main{padding:24px 0 60px}
  .tab{display:none}.tab.active{display:block}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:18px}
  h2{margin:0 0 4px;font-size:18px}.sub{color:var(--muted);font-size:13px;margin-bottom:16px}
  label{display:block;font-size:13px;font-weight:600;margin-bottom:6px}
  input,select{width:100%;font-size:14px;padding:11px 13px;border:1px solid var(--line);border-radius:12px;background:#fbfbfd;outline:none}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:0;cursor:pointer;font-weight:800;font-size:16px;padding:16px 22px;border-radius:14px;background:var(--brand);color:#fff;width:100%}
  .btn.out{background:var(--danger)}
  .btn.gray{background:#eef0f5;color:var(--ink);font-size:13px;font-weight:700;padding:8px 14px;width:auto}
  .btn.sm{font-size:13px;padding:7px 12px;width:auto}
  .status{display:flex;align-items:center;gap:12px;padding:16px;border-radius:14px;background:var(--brand-soft);margin-bottom:16px}
  .status .dot{width:12px;height:12px;border-radius:50%;background:var(--muted)}
  .status.on .dot{background:#27ae60;box-shadow:0 0 0 4px rgba(39,174,96,.18)}
  .status b{font-size:16px}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.spacer{flex:1}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th,td{text-align:right;padding:11px 10px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:600;font-size:12.5px}
  .pill{display:inline-block;background:var(--brand-soft);color:var(--brand);font-size:11.5px;padding:3px 9px;border-radius:20px;font-weight:600}
  .muted{color:var(--muted)}
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 20px;border-radius:12px;font-size:14px;opacity:0;transition:.25s;pointer-events:none;z-index:99}
  #toast.show{opacity:1}
  #gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;color:var(--muted);z-index:50}
</style>
</head>
<body>
<div id="gate">در حال بررسی دسترسی…</div>

<header>
  <div class="wrap topbar">
    <a class="logo" href="index.html">☕ باراما</a>
    <nav id="nav">
      <button data-tab="me" class="active">حضور من</button>
      <button data-tab="report" id="reportNav" style="display:none">گزارش نیروها</button>
    </nav>
    <a class="back" href="index.html">⟵ داشبورد</a>
  </div>
</header>

<main class="wrap">
  <!-- حضور من -->
  <section id="tab-me" class="tab active">
    <div class="card">
      <h2>ثبت ورود و خروج</h2>
      <div class="sub" id="meName"></div>
      <div class="status" id="status"><span class="dot"></span><b id="statusText">…</b></div>
      <button class="btn" id="clockBtn">ثبت ورود</button>
    </div>
    <div class="card">
      <div class="row" style="margin-bottom:12px">
        <h2 style="font-size:16px;flex:1">کارکرد این ماه</h2>
        <span class="muted" id="meTotal"></span>
      </div>
      <div style="overflow:auto">
        <table id="meTable"><thead><tr><th>تاریخ</th><th>ورود</th><th>خروج</th><th>مدت</th></tr></thead><tbody></tbody></table>
      </div>
      <div class="muted" id="meEmpty" style="display:none;text-align:center;padding:24px 0">رکوردی برای این ماه نیست.</div>
    </div>
  </section>

  <!-- گزارش (مدیر) -->
  <section id="tab-report" class="tab">
    <div class="card">
      <h2>گزارش همهٔ نیروها</h2>
      <div class="sub">بازهٔ زمانی را انتخاب کن.</div>
      <div class="row">
        <div><label>از</label><input type="date" id="r_from"></div>
        <div><label>تا</label><input type="date" id="r_to"></div>
        <div style="align-self:end"><button class="btn gray" id="r_apply">گزارش</button></div>
        <div style="align-self:end"><button class="btn gray" id="r_month">این ماه</button></div>
      </div>
    </div>
    <div class="card">
      <h2 style="font-size:16px;margin-bottom:12px">جمع کارکرد هر نیرو</h2>
      <div style="overflow:auto">
        <table id="rTable"><thead><tr><th>نیرو</th><th>روزها</th><th>جمع ساعت</th></tr></thead><tbody></tbody></table>
      </div>
      <div id="rDetail" style="margin-top:18px"></div>
    </div>
  </section>
</main>

<div id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/jalaali-js@1.2.6/dist/jalaali.min.js"></script>
<script src="config.js"></script>
<script src="auth.js"></script>
<script src="attendance.js"></script>
</body>
</html>
