<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>چت تیم — کافه باراما</title>
<link rel="manifest" href="chat.webmanifest">
<meta name="theme-color" content="#2e7d6b">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="چت باراما">
<link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
<style>
  :root{
    --bg:#e9ebef; --panel:#ffffff; --ink:#1f2430; --muted:#7a8194;
    --line:#e3e6ee; --brand:#2e7d6b; --brand-soft:#e6f4f0;
    --mine:#d6f1e6; --accent:#c98a2b; --danger:#d8584f;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow-x:hidden}
  body{margin:0;font-family:Vazirmatn,system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:15px}
  button,input,select,textarea{font-family:inherit}
  #gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;color:var(--muted);z-index:50}

  #app{display:flex;flex-direction:column;height:100dvh;width:100%;overflow-x:hidden;position:relative}
  header{background:var(--brand);color:#fff;display:flex;align-items:center;gap:10px;padding:10px 14px;flex:0 0 auto}
  header>div:first-child{min-width:0}
  header .title{font-weight:800;font-size:17px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  header .who{font-size:12px;opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  header .spacer{flex:1}
  header button,header a{background:rgba(255,255,255,.18);border:0;color:#fff;border-radius:10px;
    padding:8px 11px;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none}

  .channels{display:flex;gap:8px;overflow-x:auto;padding:10px 12px;background:var(--panel);
    border-bottom:1px solid var(--line);flex:0 0 auto;scrollbar-width:none}
  .channels::-webkit-scrollbar{display:none}
  .chan{white-space:nowrap;border:1px solid var(--line);background:#fff;color:var(--muted);
    border-radius:20px;padding:8px 14px;font-size:13.5px;font-weight:600;cursor:pointer;position:relative}
  .chan.active{background:var(--brand-soft);color:var(--brand);border-color:var(--brand-soft)}
  .chan .dot{position:absolute;top:-3px;inset-inline-start:-3px;background:var(--danger);color:#fff;
    font-size:10px;min-width:16px;height:16px;border-radius:9px;display:none;align-items:center;justify-content:center;padding:0 4px}

  #messages{flex:1 1 auto;overflow-y:auto;padding:14px 12px 6px;background:#aeb6c2}
  .day{text-align:center;margin:12px 0}
  .day span{background:#fff;color:var(--muted);font-size:11.5px;padding:4px 12px;border-radius:12px;box-shadow:0 1px 2px rgba(0,0,0,.06)}
  .msg{max-width:78%;margin:6px 0;padding:8px 11px 6px;border-radius:14px;background:#fff;
    box-shadow:0 1px 1px rgba(0,0,0,.07);position:relative;width:fit-content}
  .msg.mine{background:var(--mine);margin-inline-end:auto}
  .msg.theirs{margin-inline-start:auto}
  .msg .name{font-size:12px;font-weight:800;color:var(--brand);margin-bottom:3px}
  .msg .body{font-size:14.5px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
  .msg .body.list{background:#f7faf9;border-inline-start:3px solid var(--brand);padding:8px 10px;border-radius:8px;font-size:13.5px}
  .msg img{max-width:240px;width:100%;border-radius:10px;display:block;cursor:pointer}
  .msg audio{width:230px;max-width:60vw;margin-top:2px}
  .msg .time{font-size:10.5px;color:var(--muted);text-align:left;margin-top:3px}
  .msg.mentioned{box-shadow:0 0 0 2px var(--accent),0 1px 1px rgba(0,0,0,.07)}
  .ment{color:var(--brand);font-weight:800;background:var(--brand-soft);border-radius:6px;padding:0 3px}
  .msg.mine .ment{background:rgba(255,255,255,.5)}
  .seen{text-align:center;color:var(--muted);font-size:11.5px;padding:2px 0 8px}
  .seen b{color:var(--brand)}
  #mentionPop{position:absolute;bottom:60px;inset-inline:10px;background:#fff;border:1px solid var(--line);
    border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.15);max-height:200px;overflow-y:auto;display:none;z-index:30}
  #mentionPop .mi{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--line)}
  #mentionPop .mi:last-child{border:0}
  #mentionPop .mi:hover,#mentionPop .mi.active{background:var(--brand-soft)}
  #mentionPop .mi b{font-size:14px}
  #mentionPop .mi small{color:var(--muted);font-size:12px}
  #mentionPop .mi .od{width:8px;height:8px;border-radius:50%;background:#c4cad6}
  #mentionPop .mi .od.on{background:#27ae60}
  .msg .del{position:absolute;top:4px;inset-inline-start:4px;background:none;border:0;color:var(--muted);cursor:pointer;font-size:12px;opacity:0;transition:.15s}
  .msg.mine:hover .del{opacity:.7}
  .empty{text-align:center;color:var(--muted);padding:50px 10px;font-size:14px}
  .msg .quote{border-inline-start:3px solid var(--brand);background:rgba(46,125,107,.08);
    border-radius:8px;padding:5px 8px;margin-bottom:5px;font-size:12.5px}
  .msg .quote b{display:block;color:var(--brand);font-size:11.5px}
  .msg .quote span{color:var(--muted);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
  .msg .fwd{font-size:11px;color:var(--muted);font-style:italic;margin-bottom:3px}
  /* شیت پایین برای ریپلای/فوروارد/حذف */
  .sheet{position:fixed;inset:0;background:rgba(20,24,32,.4);display:none;align-items:flex-end;z-index:80}
  .sheet.show{display:flex}
  .sheet-box{background:#fff;width:100%;border-radius:18px 18px 0 0;padding:8px;max-height:70vh;overflow-y:auto}
  .sheet-box .sh{display:flex;align-items:center;gap:12px;padding:14px 16px;font-size:15px;font-weight:600;
    cursor:pointer;border-radius:12px}
  .sheet-box .sh:hover{background:var(--brand-soft)}
  .sheet-box .sh .em{font-size:20px}
  .sheet-box .sh.danger{color:var(--danger)}
  .sheet-title{padding:12px 16px 6px;color:var(--muted);font-size:13px;font-weight:700}
  /* نوار ریپلای بالای کامپوزر */
  #replyBar{display:none;align-items:center;gap:10px;background:#eef4f2;border-top:1px solid var(--line);
    padding:8px 14px}
  #replyBar.show{display:flex}
  #replyBar .rb{flex:1;border-inline-start:3px solid var(--brand);padding-inline-start:8px;min-width:0}
  #replyBar .rb b{color:var(--brand);font-size:12px;display:block}
  #replyBar .rb span{color:var(--muted);font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
  #replyBar .x{background:none;border:0;color:var(--muted);font-size:18px;cursor:pointer}

  .composer{flex:0 0 auto;background:var(--panel);border-top:1px solid var(--line);padding:8px 10px;display:flex;align-items:center;gap:8px}
  .composer input.text{flex:1;min-width:0;border-radius:22px;padding:11px 16px;border:1px solid var(--line);background:#fbfbfd}
  .iconbtn{flex:0 0 auto;width:42px;height:42px;border-radius:50%;border:0;background:#eef0f5;color:var(--brand);
    font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .iconbtn.send{background:var(--brand);color:#fff}
  .iconbtn.rec{background:var(--danger);color:#fff;animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
  .rec-bar{flex:1;display:flex;align-items:center;gap:10px;color:var(--danger);font-weight:700;font-size:14px}
  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 18px;border-radius:12px;font-size:14px;opacity:0;transition:.25s;pointer-events:none;z-index:60}
  .toast.show{opacity:1}
  #lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:70;padding:20px}
  #lightbox img{max-width:100%;max-height:100%;border-radius:8px}

  @media(max-width:430px){
    header{padding:9px 12px;gap:8px}
    header .title{font-size:16px}
    .channels{padding:9px 10px;gap:7px}
    .chan{padding:7px 12px;font-size:13px}
    #messages{padding:12px 10px 6px}
    .msg{max-width:82%}
    .composer{padding:7px 8px;gap:6px}
    .composer input.text{padding:10px 14px}
    .iconbtn{width:40px;height:40px;font-size:18px}
  }
</style>
</head>
<body>
<div id="gate">در حال بررسی دسترسی…</div>

<div id="app" hidden>
  <header>
    <div>
      <div class="title" id="hTitle">عمومی</div>
      <div class="who" id="hWho"></div>
    </div>
    <div class="spacer"></div>
    <button id="onlineBtn" title="آنلاین‌ها">🟢 ۰</button>
    <button id="soundBtn" title="صدای پیام">🔔</button>
    <a href="index.html" title="داشبورد">⟵</a>
  </header>

  <div class="channels" id="channels"></div>
  <div id="messages"><div class="empty">در حال بارگذاری…</div></div>

  <div id="mentionPop"></div>

  <div id="replyBar">
    <div class="rb"><b id="rbName"></b><span id="rbText"></span></div>
    <button type="button" class="x" id="rbCancel">✕</button>
  </div>

  <form class="composer" id="composer" autocomplete="off">
    <button type="button" class="iconbtn" id="imgBtn" title="عکس">📷</button>
    <button type="button" class="iconbtn" id="listBtn" title="ارسال لیست خرید">🛒</button>
    <input class="text" id="msgInput" placeholder="پیام بنویس…">
    <button type="button" class="iconbtn" id="micBtn" title="پیام صوتی">🎤</button>
    <button type="submit" class="iconbtn send" id="sendBtn" title="ارسال">➤</button>
    <input type="file" id="imgFile" accept="image/*" hidden>
  </form>
</div>

<div id="lightbox"><img id="lightboxImg" src="" alt=""></div>
<div class="sheet" id="sheet"><div class="sheet-box" id="sheetBox"></div></div>
<audio id="notifyAudio" src="notify.m4a" preload="auto"></audio>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="auth.js"></script>
<script src="chat.js"></script>
<script>
  if ("serviceWorker" in navigator)
    window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(()=>{}));
</script>
</body>
</html>
