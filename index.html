<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>کافه باراما — ورود</title>
<link rel="manifest" href="app.webmanifest">
<meta name="theme-color" content="#2e7d6b">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="کافه باراما">
<link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
<style>
  :root{
    --bg:#f6f7fb; --card:#fff; --ink:#1f2430; --muted:#7a8194; --line:#e7e9f0;
    --brand:#2e7d6b; --brand-soft:#e6f4f0; --accent:#c98a2b; --danger:#d8584f; --radius:16px;
    --shadow:0 6px 24px rgba(31,36,48,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:Vazirmatn,system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:15px}
  button,input,select{font-family:inherit}
  .banner{background:#fdecea;color:#a5342c;text-align:center;padding:10px;font-size:13px;display:none}

  /* ورود */
  .overlay{position:fixed;inset:0;background:linear-gradient(160deg,#2e7d6b,#1f5a4d);
    display:flex;align-items:center;justify-content:center;padding:18px;z-index:40}
  .login-card{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:390px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
  .login-card h1{margin:0 0 2px;font-size:23px;color:var(--brand);text-align:center}
  .login-card .sub{color:var(--muted);font-size:13px;text-align:center;margin-bottom:20px}
  label{display:block;font-size:13px;font-weight:600;margin:12px 0 6px}
  input,select{width:100%;font-size:15px;padding:12px 13px;border:1px solid var(--line);border-radius:12px;background:#fbfbfd;outline:none}
  input:focus,select:focus{border-color:var(--brand);background:#fff}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:0;cursor:pointer;font-weight:700;
    font-size:15px;padding:13px 18px;border-radius:12px;background:var(--brand);color:#fff;width:100%}
  .btn:active{filter:brightness(.94)}
  .btn.gray{background:#eef0f5;color:var(--ink)}
  .btn.sm{width:auto;padding:8px 14px;font-size:13px}
  .btn.danger{background:transparent;color:var(--danger);width:auto;padding:6px 10px}
  .linkbtn{background:none;border:0;color:var(--brand);font-weight:600;font-size:13.5px;cursor:pointer;margin-top:14px;width:100%;padding:6px}
  .err{color:var(--danger);font-size:13px;text-align:center;margin-top:10px;min-height:18px}

  /* داشبورد */
  header{background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
  .wrap{max-width:1000px;margin:0 auto;padding:0 18px}
  .topbar{display:flex;align-items:center;gap:14px;height:64px}
  .logo{font-weight:800;font-size:20px;color:var(--brand)}
  .chip{margin-inline-start:auto;color:var(--muted);font-size:13px}
  main{padding:28px 0 60px}
  .hello{font-size:22px;font-weight:800;margin:0 0 4px}
  .hello small{display:block;color:var(--muted);font-size:13px;font-weight:500;margin-top:4px}
  .cards{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:22px}
  @media(max-width:620px){.cards{grid-template-columns:1fr}}
  .mod{display:flex;align-items:center;gap:16px;background:var(--card);border:1px solid var(--line);
    border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;cursor:pointer;text-decoration:none;color:inherit;transition:.15s}
  .mod:hover{transform:translateY(-2px);border-color:var(--brand-soft)}
  .mod .ic{font-size:34px;width:64px;height:64px;border-radius:16px;background:var(--brand-soft);
    display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .mod b{font-size:17px}
  .mod .d{color:var(--muted);font-size:13px;margin-top:3px}

  dialog{border:0;border-radius:18px;padding:0;box-shadow:0 20px 60px rgba(0,0,0,.25);max-width:680px;width:94%}
  dialog::backdrop{background:rgba(20,24,32,.45)}
  .modal-body{padding:22px}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th,td{text-align:right;padding:10px 8px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:600;font-size:12.5px}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .pill{display:inline-block;background:var(--brand-soft);color:var(--brand);font-size:11.5px;padding:3px 9px;border-radius:20px;font-weight:600}
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;
    padding:12px 20px;border-radius:12px;font-size:14px;opacity:0;transition:.25s;pointer-events:none;z-index:99}
  #toast.show{opacity:1}
</style>
</head>
<body>
<div id="configBanner" class="banner">⚠️ کلید دیتابیس در config.js تنظیم نشده است.</div>

<!-- ورود -->
<div id="login" class="overlay">
  <div class="login-card">
    <h1>☕ کافه باراما</h1>
    <div class="sub">برای ورود نام کاربری و رمز خود را وارد کنید</div>
    <label>نام کاربری</label>
    <input id="username" autocomplete="username" placeholder="username">
    <label>رمز عبور</label>
    <input id="password" type="password" autocomplete="current-password" placeholder="••••••">
    <div class="err" id="loginErr"></div>
    <button class="btn" id="loginBtn">ورود</button>
    <button class="linkbtn" id="toggleSignup">ساخت اولین حساب مدیر (فقط بار اول)</button>
    <div id="signupBox" hidden>
      <label>نام کامل</label><input id="suName" placeholder="نام و نام خانوادگی">
      <div class="grid2">
        <div><label>نام کاربری</label><input id="suUser" placeholder="username"></div>
        <div><label>رمز (حداقل ۶ نویسه)</label><input id="suPass" type="password" placeholder="••••••"></div>
      </div>
      <button class="btn gray" id="signupBtn" style="margin-top:12px">ساخت حساب</button>
      <div class="err" id="suErr"></div>
    </div>
  </div>
</div>

<!-- داشبورد -->
<div id="app" hidden>
  <header>
    <div class="wrap topbar">
      <div class="logo">☕ کافه باراما</div>
      <span class="chip" id="userChip"></span>
      <button class="btn sm gray" id="logoutBtn">خروج</button>
    </div>
  </header>
  <main class="wrap">
    <h2 class="hello" id="hello"></h2>
    <div class="cards" id="cards"></div>
  </main>
</div>

<!-- مدیریت کاربران (فقط مدیر) -->
<dialog id="usersDlg">
  <div class="modal-body">
    <div class="row"><h2 style="margin:0;flex:1">مدیریت کاربران</h2>
      <button class="btn danger" id="usersClose">بستن</button></div>
    <div style="margin:14px 0;padding:14px;border:1px dashed var(--line);border-radius:12px">
      <b style="font-size:14px">افزودن کاربر جدید</b>
      <div class="grid2" style="margin-top:10px">
        <div><label>نام کامل</label><input id="nuName" placeholder="نام"></div>
        <div><label>نام کاربری</label><input id="nuUser" placeholder="username"></div>
        <div><label>رمز (حداقل ۶)</label><input id="nuPass" type="password" placeholder="••••••"></div>
        <div><label>نقش</label>
          <select id="nuRole">
            <option value="staff">نیرو</option>
            <option value="accountant">حسابدار</option>
            <option value="admin">مدیر</option>
          </select>
        </div>
      </div>
      <button class="btn sm" id="nuAdd" style="margin-top:12px">+ ساخت کاربر</button>
      <div class="err" id="nuErr" style="text-align:right"></div>
    </div>
    <div style="overflow:auto">
      <table id="usersTable">
        <thead><tr><th>نام</th><th>نام کاربری</th><th>نقش</th><th>فعال</th><th></th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</dialog>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="auth.js"></script>
<script src="index.js"></script>
<script>
  if ("serviceWorker" in navigator)
    window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(console.error));
</script>
</body>
</html>
